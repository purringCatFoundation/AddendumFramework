# Example Nginx proxy cache configuration for Addendum HTTP cache headers.
# Mount as /etc/nginx/conf.d/default.conf and proxy to the FrankenPHP origin.
# Stock Nginx does not purge by response tag headers; use this with NGINX Plus
# or a purge module that consumes X-Cache-Invalidate / X-Cache-Tags.

proxy_cache_path /var/cache/nginx/addendum levels=1:2 keys_zone=addendum_http_cache:32m max_size=256m inactive=10m use_temp_path=off;

map $request_method $addendum_cacheable_method {
    default 0;
    GET 1;
    HEAD 1;
}

map $addendum_cacheable_method $addendum_skip_cache {
    default 1;
    1 0;
}

upstream addendum_origin {
    server frankenphp:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache addendum_http_cache;
        proxy_cache_bypass $addendum_skip_cache;
        proxy_no_cache $addendum_skip_cache $upstream_http_set_cookie;
        proxy_cache_valid 200 204 301 302 10m;
        proxy_cache_lock on;

        proxy_pass http://addendum_origin;

        add_header X-Nginx-Cache $upstream_cache_status always;
        add_header X-Origin-Cache-Tags $upstream_http_x_cache_tags always;
        add_header X-Origin-Cache-Invalidate $upstream_http_x_cache_invalidate always;
    }
}
