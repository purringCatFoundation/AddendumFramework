name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '24 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: php

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
