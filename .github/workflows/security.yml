name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '42 4 * * 1'

permissions:
  contents: read

jobs:
  composer-audit:
    name: Composer Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ds, pdo_pgsql
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Audit locked dependencies
        run: composer audit --locked --format=plain
